name: Taskjrnl Continuous Intergration

on:
  pull_request:
    branches: [ "main" ]

jobs:
  GoTests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      
      - name: Install dependencies
        run: go mod download
      
      - name: Run tests
        run: go test ./... -v 

